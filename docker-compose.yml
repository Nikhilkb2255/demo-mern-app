version: '3.8'

services:
  # Your Node.js Application with Observability
  app:
    build: .
    container_name: my-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=info
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_AGENT_PORT=6832
      - OBSERVABILITY_API_KEY=${OBSERVABILITY_API_KEY}
      - OPENSEARCH_URL=http://opensearch:9200
      # MongoDB configuration for API key validation
      - MONGODB_URI=${MONGODB_URI}
      - DATABASE_NAME=devopsark-dev
      - COLLECTION_NAME=observabilityIntegrations
      # Pushgateway configuration
      - PUSHGATEWAY_URL=http://pushgateway:9091
      # Direct Loki configuration
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - LOKI_BATCH_SIZE=10
      - LOKI_BATCH_TIMEOUT=5000
      - LOKI_RETRY_ATTEMPTS=3
      - LOKI_RETRY_DELAY=1000
      - LOKI_CIRCUIT_BREAKER_THRESHOLD=5
      # Enable local file logging
      - ENABLE_LOCAL_LOGS=true
    restart: unless-stopped
    depends_on:
      - pushgateway
      - loki
      - jaeger
    networks:
      - observability-network

  # Prometheus Pushgateway for push-based metrics
  pushgateway:
    image: prom/pushgateway:v1.6.2
    container_name: my-app-pushgateway
    ports:
      - "9091:9091"
    command:
      - '--web.listen-address=0.0.0.0:9091'
      - '--web.telemetry-path=/metrics'
      - '--persistence.file=/tmp/pushgateway.db'
    volumes:
      - pushgateway-data:/tmp
    networks:
      - observability-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: my-app-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - pushgateway
    networks:
      - observability-network

  # Loki for log aggregation
  loki:
    image: grafana/loki:2.9.0
    container_name: my-app-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability-network

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: my-app-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector
      - "6831:6831/udp" # Jaeger agent
      - "6832:6832/udp" # Jaeger agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - observability-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: my-app-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - pushgateway
      - prometheus
      - loki
      - jaeger
    networks:
      - observability-network

  # OpenSearch for persistent storage
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: my-app-opensearch
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - observability-network

  # OpenSearch Dashboards for visualization
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: my-app-opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"
    depends_on:
      - opensearch
    networks:
      - observability-network


volumes:
  prometheus-data:
    driver: local
  pushgateway-data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local
  opensearch-data:
    driver: local

networks:
  observability-network:
    driver: bridge