version: '3.8'

services:
  # Your Node.js Application with Winston logging
  app:
    build: .
    container_name: my-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=info
      - SERVICE_NAME=demo-mern-app
      - SERVICE_VERSION=1.0.0
      - LOG_DIR=/var/log/app
    volumes:
      - app-logs:/var/log/app
    restart: unless-stopped

  # Promtail - Log collector for local testing
  promtail:
    image: grafana/promtail:2.8.0
    container_name: my-app-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - app-logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - app

volumes:
  app-logs: