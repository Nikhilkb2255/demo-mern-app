receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "*"
          allowed_headers:
            - "*"

processors:
  # Batch processor for better performance
  batch:
    timeout: 1s
    send_batch_size: 1024
  
  # Memory limiter to prevent OOM
  memory_limiter:
    limit_mib: 512

  # Custom API key validator processor
  apikey_validator:
    mongodb_uri: "${MONGODB_URI}"
    database: "${MONGODB_DATABASE}"
    collection: "observabilityIntegrations"
    validation_timeout: 5s
    cache_ttl: 300s  # Cache valid API keys for 5 minutes

exporters:
  # OpenSearch exporter for logs
  opensearch:
    endpoint: "${OPENSEARCH_ENDPOINT}"
    index: "otlp-logs"
    mapping:
      mode: "ecs"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  # Logging exporter for debugging
  logging:
    loglevel: info
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, apikey_validator, batch]
      exporters: [opensearch, logging]
  
  extensions: [health_check, pprof, zpages]
  
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    pprof:
      endpoint: 0.0.0.0:1777
    zpages:
      endpoint: 0.0.0.0:55679